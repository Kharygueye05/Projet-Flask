{% extends "base.html" %}
{% block title %}Modifier un étudiant{% endblock %}

{% block content %}
<style>
    /* Styles modernes identiques */
    .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        border-radius: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
        overflow: hidden;
    }
    .glass-card:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
    }
    .form-input {
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 0.75rem;
    }
    .form-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        outline: none;
        background: white;
    }
    .matricule-card {
        background: rgba(79, 70, 229, 0.08);
        border-left: 4px solid #4f46e5;
        border-radius: 1rem;
    }
    .btn-cancel {
        background: rgba(209, 213, 219, 0.6);
        backdrop-filter: blur(4px);
        transition: all 0.2s;
    }
    .btn-cancel:hover {
        background: rgba(156, 163, 175, 0.8);
        transform: translateY(-1px);
    }
    .btn-submit {
        background: linear-gradient(105deg, #4f46e5 0%, #7c3aed 100%);
        transition: all 0.2s;
        box-shadow: 0 4px 12px -4px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
    }
</style>

<div class="max-w-lg mx-auto my-8">
    <div class="glass-card">
        <!-- En-tête -->
        <div class="bg-gradient-to-r from-indigo-600/80 to-indigo-800/80 backdrop-blur-sm px-6 py-5">
            <a href="{{ url_for('students.list') }}" 
               class="text-indigo-200 hover:text-white text-sm flex items-center mb-3 transition gap-1">
                <i class="fas fa-arrow-left"></i> Retour à la liste
            </a>
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl">
                    <i class="fas fa-user-edit text-white text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Modifier l'étudiant</h2>
            </div>
            <p class="text-indigo-200 text-sm mt-1">Modifiez les informations de l'étudiant</p>
        </div>

        <div class="p-6">
            <!-- Matricule en lecture seule -->
            <div class="matricule-card mb-6 p-4">
                <p class="text-xs font-bold uppercase text-gray-500 mb-1">Matricule Officiel</p>
                <p class="text-indigo-700 font-mono font-bold text-lg">{{ student.matricule }}</p>
            </div>

            <form method="POST" action="{{ url_for('students.edit', id=student.id) }}">
                <!-- Nom complet -->
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">
                        <i class="fas fa-user text-indigo-500 mr-2"></i>Nom complet
                    </label>
                    <input type="text" name="name" value="{{ student.name }}" required
                           class="form-input w-full p-3 focus:ring-2 focus:ring-indigo-400 transition">
                </div>

                <!-- Email (désactivé, généré automatiquement) -->
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">
                        <i class="fas fa-envelope text-indigo-500 mr-2"></i>Adresse Email
                        <span class="text-gray-400 font-normal text-xs">(générée automatiquement)</span>
                    </label>
                    <div class="relative">
                        <input type="email" name="email" disabled
                               placeholder="prenom.nom@etu.univ.sn"
                               class="form-input w-full p-3 bg-gray-50 text-gray-400 italic cursor-not-allowed">
                    </div>
                    <p class="text-xs text-gray-400 mt-1">
                        <i class="fas fa-info-circle mr-1"></i>L'email sera généré automatiquement à partir du nom
                    </p>
                </div>

                <!-- Genre + Date naissance -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block font-semibold text-gray-700 mb-2">
                            <i class="fas fa-venus-mars text-indigo-500 mr-2"></i>Genre
                        </label>
                        <select name="sexe" required
                                class="form-input w-full p-3 focus:ring-2 focus:ring-indigo-400 transition">
                            <option value="" disabled>Choisir...</option>
                            <option value="M" {% if student.sexe == 'M' %}selected{% endif %}>Masculin</option>
                            <option value="F" {% if student.sexe == 'F' %}selected{% endif %}>Féminin</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-2">
                            <i class="fas fa-calendar-alt text-indigo-500 mr-2"></i>Date de naissance
                        </label>
                        <input type="date" name="date_naissance" value="{{ student.date_naissance }}" required
                               class="form-input w-full p-3 focus:ring-2 focus:ring-indigo-400 transition">
                    </div>
                </div>

                <!-- Boutons -->
                <div class="flex justify-between gap-4 border-t pt-5">
                    <a href="{{ url_for('students.list') }}" 
                       class="btn-cancel flex-1 text-center px-4 py-3 rounded-xl font-medium text-gray-700 transition">
                        <i class="fas fa-arrow-left mr-2"></i> Annuler
                    </a>
                    <button type="submit"
                            class="btn-submit flex-1 text-white px-6 py-3 rounded-xl font-semibold transition shadow-md">
                        <i class="fas fa-save mr-2"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
