{% extends "base.html" %}
{% block title %}Ajouter enseignant{% endblock %}
{% block content %}
<style>
    /* Styles complémentaires */
    .glass-form {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        border-radius: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
        overflow: hidden;
    }
    .glass-form:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
    }
    .form-input {
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
        background: rgba(255, 255, 255, 0.6);
    }
    .form-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        outline: none;
        background: white;
    }
    .btn-cancel {
        background: rgba(209, 213, 219, 0.6);
        backdrop-filter: blur(4px);
        transition: all 0.2s;
    }
    .btn-cancel:hover {
        background: rgba(156, 163, 175, 0.8);
        transform: translateY(-1px);
    }
    .btn-submit {
        background: linear-gradient(105deg, #4f46e5 0%, #7c3aed 100%);
        transition: all 0.2s;
        box-shadow: 0 4px 12px -4px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
    }
</style>

<div class="max-w-lg mx-auto my-8">
    <div class="glass-form">
        <div class="bg-gradient-to-r from-indigo-600/80 to-indigo-800/80 backdrop-blur-sm px-6 py-5">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl">
                    <i class="fas fa-chalkboard-user text-white text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Nouvel enseignant</h2>
            </div>
            <p class="text-indigo-200 text-sm mt-1">Ajoutez un nouveau professeur à l'établissement</p>
        </div>

        <div class="p-6">
            <form method="POST">
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">
                        <i class="fas fa-user text-indigo-500 mr-2"></i>Nom
                    </label>
                    <input type="text" name="name" required 
                           class="form-input w-full rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 transition"
                           placeholder="Nom complet">
                </div>

                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">
                        <i class="fas fa-envelope text-indigo-500 mr-2"></i>Email
                    </label>
                    <input type="email" name="email" required 
                           class="form-input w-full rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 transition"
                           placeholder="prenom.nom@ecole.fr">
                </div>

                <div class="mb-6">
                    <label class="block font-semibold text-gray-700 mb-2">
                        <i class="fas fa-tags text-indigo-500 mr-2"></i>Spécialités
                    </label>
                    <input type="text" name="specialities" required 
                           class="form-input w-full rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 transition"
                           placeholder="Mathématiques, Physique, Informatique"
                           value="{{ request.form.get('specialities', '') }}">
                    <p class="text-xs text-gray-400 mt-1">Séparez les spécialités par des virgules</p>
                </div>

                <div class="flex justify-between gap-4">
                    <a href="{{ url_for('teachers.list') }}" 
                       class="btn-cancel flex-1 text-center px-4 py-3 rounded-xl font-medium text-gray-700 transition">
                        <i class="fas fa-times mr-2"></i>Annuler
                    </a>
                    <button type="submit" 
                            class="btn-submit flex-1 text-white px-6 py-3 rounded-xl font-semibold transition shadow-md">
                        <i class="fas fa-save mr-2"></i>Créer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
