{% extends "base.html" %}
{% block title %}Modifier une séance{% endblock %}
{% block content %}
<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        border-radius: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
        overflow: hidden;
    }
    .glass-card:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
    }
    .form-input {
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 0.75rem;
    }
    .form-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        outline: none;
        background: white;
    }
    .btn-cancel {
        background: rgba(209, 213, 219, 0.6);
        backdrop-filter: blur(4px);
        transition: all 0.2s;
    }
    .btn-cancel:hover {
        background: rgba(156, 163, 175, 0.8);
        transform: translateY(-1px);
    }
    .btn-submit {
        background: linear-gradient(105deg, #4f46e5 0%, #7c3aed 100%);
        transition: all 0.2s;
        box-shadow: 0 4px 12px -4px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
    }
</style>
<div class="max-w-lg mx-auto my-8">
    <div class="glass-card">
        <div class="bg-gradient-to-r from-indigo-600/80 to-indigo-800/80 backdrop-blur-sm px-6 py-5">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl">
                    <i class="fas fa-edit text-white text-xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-white">Modifier la séance</h2>
                </div>
            </div>
        </div>
        <div class="p-6">
            <form method="POST">
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">Date</label>
                    <input type="date" name="date" value="{{ session_date }}" required class="form-input w-full p-3">
                </div>
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">Heure de début</label>
                    <input type="time" name="time" value="{{ session_time }}" required class="form-input w-full p-3">
                </div>
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">Durée (minutes)</label>
                    <input type="number" name="duration" value="{{ session.duration }}" required min="30" step="30" class="form-input w-full p-3">
                </div>
                <div class="mb-5">
                    <label class="block font-semibold text-gray-700 mb-2">Mode</label>
                    <select name="mode" id="mode" required class="form-input w-full p-3">
                        <option value="Présentiel" {% if session.mode == 'Présentiel' %}selected{% endif %}>Présentiel</option>
                        <option value="Distanciel" {% if session.mode == 'Distanciel' %}selected{% endif %}>Distanciel</option>
                    </select>
                </div>
                <div class="mb-5" id="room_div">
                    <label class="block font-semibold text-gray-700 mb-2">Salle</label>
                    <select name="room_id" class="form-input w-full p-3">
                        {% for r in rooms %}
                        <option value="{{ r.id }}" {% if r.id == session.room_id %}selected{% endif %}>{{ r.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex justify-between gap-4 pt-3">
                    <a href="{{ url_for('courses.sessions_list') }}" class="btn-cancel flex-1 text-center px-4 py-3 rounded-xl">Annuler</a>
                    <button type="submit" class="btn-submit flex-1 text-white px-6 py-3 rounded-xl">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const modeSelect = document.getElementById('mode');
    const roomDiv = document.getElementById('room_div');
    function toggleRoom() {
        roomDiv.style.display = modeSelect.value === 'Distanciel' ? 'none' : 'block';
    }
    modeSelect.addEventListener('change', toggleRoom);
    toggleRoom();
</script>
{% endblock %}
